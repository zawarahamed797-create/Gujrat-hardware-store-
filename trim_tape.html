<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ٹرم اور ٹیپ - گجرات ہارڈ ویئر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a3a; --accent: #c5a059; --bg: #fdfaf5; --success: #27ae60; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); text-align: right; }
        .nav-menu { background: #111e2b; display: flex; justify-content: center; gap: 10px; padding: 10px; position: sticky; top: 0; z-index: 1100; border-bottom: 1px solid var(--accent); overflow-x: auto; }
        .nav-link { color: white; text-decoration: none; font-size: 13px; font-weight: bold; padding: 6px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); white-space: nowrap; }
        .nav-link.active { background: var(--accent); border-color: white; color: #111; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
        .card { background: white; border-radius: 12px; padding: 10px; border: 1px solid #eee; text-align: center; }
        .main-img { width: 100%; height: 150px; object-fit: contain; }
        .card-price { color: var(--success); font-weight: 800; font-size: 18px; }
        .btn-add { width: 100%; background: var(--primary); color: white; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #cart-panel { position: fixed; left: -105%; top: 0; width: 85%; height: 100%; background: white; transition: 0.4s; z-index: 2000; padding: 20px; box-shadow: 5px 0 25px rgba(0,0,0,0.2); }
        #cart-panel.active { left: 0; }
    </style>
</head>
<body>

<nav class="nav-menu">
    <a href="./index.html" class="nav-link">شیٹس (Sheets)</a>
    <a href="./trim_tape.html" class="nav-link active">ٹرم و ٹیپ</a>
    <a href="#" class="nav-link">ہارڈ ویئر</a>
    <a href="#" class="nav-link">ایکسیسریز</a>
</nav>

<header>
    <h2>ٹرم اور ٹیپ کلیکشن</h2>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <img class="main-img" src="https://img.icons8.com/color/144/aluminum.png">
            <h3>ایلومینیم T-ٹرم</h3>
            <div class="card-price">Rs. 450</div>
            <button class="btn-add" onclick="addToCart('Aluminum T-Trim', 450)">کارٹ میں ڈالیں</button>
        </div>
    </div>
</div>

<div id="cart-panel">
    <button onclick="toggleCart()">بند کریں</button>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto;"></div>
    <div id="total">ٹوٹل بل: Rs. 0</div>
    <button style="background:#25D366; color:white; padding:10px; width:100%; border:none;" onclick="sendWhatsApp()">آرڈر کریں</button>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('gujrat_hardware_cart')) || [];
    window.onload = function() { updateUI(); };
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function addToCart(name, price) {
        let item = cart.find(i => i.name === name);
        item ? item.quantity++ : cart.push({name, price, quantity: 1});
        localStorage.setItem('gujrat_hardware_cart', JSON.stringify(cart));
        updateUI();
    }
    function updateUI() {
        const list = document.getElementById('cart-list');
        let total = 0;
        list.innerHTML = "";
        cart.forEach((item, index) => {
            total += (item.price * item.quantity);
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px;">
                <span>${item.name} x ${item.quantity}</span>
                <button onclick="removeFromCart(${index})">ختم</button>
            </div>`;
        });
        document.getElementById('total').innerText = "ٹوٹل بل: Rs. " + total.toLocaleString();
    }
    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem('gujrat_hardware_cart', JSON.stringify(cart));
        updateUI();
    }
    function sendWhatsApp() {
        let text = "*آرڈر لسٹ*%0A";
        cart.forEach(item => text += `• ${item.name} (${item.quantity})%0A`);
        window.open(`https://wa.me/923130781469?text=${text}`, '_blank');
    }
</script>
</body>
</html>
